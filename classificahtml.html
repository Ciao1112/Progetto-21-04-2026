<!DOCTYPE html>
<html lang="it">
<head>
   
    <title>Gestione Gare Atletica</title>
    <link rel="stylesheet" href="sileprogettocss.css">
</head>
<body>
    <div class="contenitore">
        <h1>Gare di Atletica</h1>
        
        <form id="atleticaForm">
            <div class="input-group">
                <label>Nome Atleta:</label>
                <input type="text" id="atleta" required>
            </div>

            <div class="input">
                <div class="input-item">
                    <label>Vortex (Tempo):</label>
                    <input type="number" step="0.01" id="vortex" placeholder="sec" required>
                </div>
                <div class="input-item">
                    <label>Staffetta (Tempo):</label>
                    <input type="number" step="0.01" id="staffetta" placeholder="sec" required>
                </div>
                <div class="input-item">
                    <label>Salto in Lungo (Tempo):</label>
                    <input type="number" step="0.01" id="salto" placeholder="sec" required>
                </div>
                <div class="input-item">
                    <label>Velocità (Misura):</label>
                    <input type="number" step="0.01" id="velocita" placeholder="m/s o metri" required>
                </div>
            </div>

            <button type="button" onclick="salvaRisultato()">Salva</button>
        </form>

        <hr>

        <h2>Storico Risultati degli anni passati</h2>
        <table id="tabellaRisultati">
            <thead>
                <tr>
                    <th>Atleta</th>
                    <th>Vortex</th>
                    <th>Staffetta</th>
                    <th>Salto</th>
                    <th>Velocità</th>
                    <th>Stato</th>
                </tr>
            </thead>
            <tbody id="corpoTabella">
                </tbody>
        </table>
    </div>
    <script>document.addEventListener('DOMContentLoaded', mostraDati);

        function salvaRisultato() {
            const atleta = document.getElementById('atleta').value;
            const vortex = parseFloat(document.getElementById('vortex').value);
            const staffetta = parseFloat(document.getElementById('staffetta').value);
            const salto = parseFloat(document.getElementById('salto').value);
            const velocita = parseFloat(document.getElementById('velocita').value);
        
            if (!atleta || isNaN(vortex)) return alert("Compila tutti i campi!");
        
            // Logica: Se la velocità (l'unica prova singola) è alta, va in finale
            // Esempio: Se velocità > 8 o media tempi < 10 (personalizzabile)
            let inFinale = (velocita > 7) ? "IN FINALE 🏆" : "Non qualificato";
        
            const nuovoDato = { atleta, vortex, staffetta, salto, velocita, inFinale };
        
            // Recupera vecchi dati o crea array vuoto
            let storico = JSON.parse(localStorage.getItem('gareAtletica')) || [];
            storico.push(nuovoDato);
        
            // Salva nel browser
            localStorage.setItem('gareAtletica', JSON.stringify(storico));
        
            mostraDati();
            document.getElementById('atleticaForm').reset();
        }
        
        function mostraDati() {
            const corpo = document.getElementById('corpoTabella');
            corpo.innerHTML = "";
            let storico = JSON.parse(localStorage.getItem('gareAtletica')) || [];
        
            storico.forEach(dato => {
                let riga = `
                    <tr class="${dato.inFinale.includes('FINALE') ? 'finale' : ''}">
                        <td>${dato.atleta}</td>
                        <td>${dato.vortex}s</td>
                        <td>${dato.staffetta}s</td>
                        <td>${dato.salto}s</td>
                        <td>${dato.velocita}</td>
                        <td>${dato.inFinale}</td>
                    </tr>`;
                corpo.innerHTML += riga;
            });
        }</script>
</body>
</html>
